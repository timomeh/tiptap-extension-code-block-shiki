name: Publish Package to npmjs
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm
      - run: npm install -g npm@latest
      - run: pnpm install
      - run: pnpm test
      - run: pnpm lint
      - run: pnpm build
      - run: npm publish
